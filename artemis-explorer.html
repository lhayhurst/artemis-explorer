<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis Preset Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#000;--surface:#0a0a0a;--surface-2:#111;--surface-3:#181818;
  --border:#1e1e1e;--border-hi:#333;
  --text:#fff;--text-dim:#999;--text-muted:#555;
  --accent:#fff;--accent-dim:rgba(255,255,255,0.06);
  --green:#4ade80;--cyan:#67e8f9;--purple:#c4b5fd;--pink:#f9a8d4;--orange:#fdba74;--amber:#facc15;
  --c-vco:#fff;--c-vcf:#f9a8d4;--c-env:#4ade80;--c-lfo:#facc15;
  --c-fx:#c4b5fd;--c-seq:#67e8f9;--c-mod:#fdba74;--c-global:#999;
  --sidebar-w:260px;--header-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
.header{height:var(--header-h);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo svg{height:22px;width:auto}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.bank-tabs{display:flex;gap:2px;margin-left:20px}
.bank-tab{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .15s;position:relative}
.bank-tab:hover{color:var(--text-dim);border-color:var(--border-hi)}
.bank-tab.active{background:var(--accent-dim);color:var(--text);border-color:var(--text-muted)}
.bank-tab.loaded::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--green);border-radius:50%}
.bank-tab.factory::after{background:var(--cyan)}
.bank-tab .src-badge{font-size:7px;position:absolute;top:-2px;right:-2px;padding:1px 3px;border-radius:2px;letter-spacing:.3px;line-height:1;font-weight:600}
.bank-tab .src-badge.factory{background:rgba(103,232,249,.15);color:var(--cyan)}
.bank-tab .src-badge.user{background:rgba(74,222,128,.15);color:var(--green)}
.header-spacer{flex:1}
.view-tabs{display:flex;gap:2px}
.view-tab{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1px;padding:7px 14px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .15s;text-transform:uppercase}
.view-tab:hover{color:var(--text-dim)}
.view-tab.active{color:var(--text);border-color:var(--border-hi)}
.hdr-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;padding:7px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;background:transparent;color:var(--text-muted)}
.hdr-btn:hover{border-color:var(--text-muted);color:var(--text)}
.hdr-btn.factory-btn{color:var(--cyan);border-color:rgba(103,232,249,.3)}
.hdr-btn.factory-btn:hover{border-color:var(--cyan)}
.hdr-btn.midi-btn{color:var(--green);border-color:rgba(74,222,128,.3)}
.hdr-btn.midi-btn:hover{border-color:var(--green)}
.hdr-btn.midi-btn.listening{color:var(--bg);background:var(--green);border-color:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.midi-panel{display:none;position:fixed;top:var(--header-h);right:20px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;z-index:200;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.midi-panel.open{display:block}
.midi-panel h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.midi-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'Outfit',sans-serif;outline:none;margin-bottom:10px}
.midi-select:focus{border-color:var(--text-muted)}
.midi-status{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:8px;line-height:1.6}
.midi-status .count{color:var(--green);font-weight:600}
.midi-bar{display:flex;gap:6px;margin-top:10px}
.midi-bar button{font-family:'JetBrains Mono',monospace;font-size:9px;padding:6px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.midi-bar button:hover{border-color:var(--text-muted);color:var(--text)}
.midi-bar button.listen-btn{color:var(--green);border-color:rgba(74,222,128,.3)}
.midi-bar button.listen-btn:hover{border-color:var(--green)}
.midi-bar button.listen-btn.active{background:var(--green);color:var(--bg);border-color:var(--green)}
.credit{font-size:10px;color:var(--text-muted);text-decoration:none;transition:color .15s;border-left:1px solid var(--border);padding-left:14px;margin-left:4px;white-space:nowrap}
.credit:hover{color:var(--text-dim)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sidebar-search{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'Outfit',sans-serif;outline:none}
.sidebar-search:focus{border-color:var(--text-muted)}
.sidebar-search::placeholder{color:var(--text-muted)}
.preset-list{flex:1;overflow-y:auto;padding:2px 0}
.preset-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
.preset-item:hover{background:var(--surface-2)}
.preset-item.active{background:var(--accent-dim);border-left-color:var(--text)}
.preset-item.flash{animation:slotflash .8s ease-out}
@keyframes slotflash{0%{background:var(--green)}50%{background:rgba(74,222,128,.15)}100%{background:var(--accent-dim)}}
.preset-item.compare-selected{border-left-color:var(--orange)}
.preset-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);min-width:26px}
.preset-item.active .preset-num{color:var(--text)}
.preset-label{font-size:12px;color:var(--text-dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.preset-item.active .preset-label{color:var(--text);font-weight:500}
.preset-mode-badge{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 5px;background:var(--surface-3);border-radius:3px;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--border)}
.preset-mini-bars{display:flex;gap:1px;align-items:flex-end;height:14px}
.preset-mini-bar{width:3px;border-radius:1px}
.content-area{flex:1;overflow-y:auto;padding:24px 28px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center;gap:16px}
.empty-state svg{opacity:.15}
.empty-state h3{font-size:15px;font-weight:500;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.empty-state p{font-size:13px;max-width:420px;line-height:1.7}
.detail-header{margin-bottom:24px}
.detail-title{font-size:20px;font-weight:600;letter-spacing:1px}
.detail-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px;font-weight:300}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none}
.card-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-title{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:9px;letter-spacing:2px;text-transform:uppercase;flex:1;color:var(--text-dim)}
.card-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted)}
.card-chevron{font-size:10px;color:var(--text-muted);transition:transform .2s}
.card-head.open .card-chevron{transform:rotate(90deg)}
.card-body{display:none;padding:2px 0 6px}
.card-body.open{display:block}
.pr{display:flex;align-items:center;padding:4px 14px;gap:10px;transition:background .08s}
.pr:hover{background:var(--surface-2)}
.pr-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);min-width:140px;flex-shrink:0}
.pr-bar{flex:1;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden;min-width:60px}
.pr-fill{height:100%;border-radius:2px}
.pr-v{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;min-width:70px;text-align:right}
.pr-v.str{color:var(--cyan)}.pr-v.on{color:var(--green)}.pr-v.off,.pr-v.zero{color:var(--text-muted)}
.mod-section{margin-top:24px}
.mod-title{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;color:var(--text-dim)}
.mod-tabs{display:flex;gap:2px;margin-bottom:10px}
.mod-tab{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.5px}
.mod-tab:hover{color:var(--text-dim)}
.mod-tab.active{color:var(--orange);border-color:rgba(253,186,116,.4)}
.mod-tab .dot{display:inline-block;width:4px;height:4px;background:var(--orange);border-radius:50%;margin-left:4px;vertical-align:middle}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px}
.mg-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:3px}
.mg-row.has{background:rgba(253,186,116,.04)}
.mg-n{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);min-width:130px}
.mg-row.has .mg-n{color:var(--text-dim)}
.mg-v{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:var(--text-muted)}
.mg-row.has .mg-v{color:var(--orange)}
.seq-grid{display:flex;flex-wrap:wrap;gap:3px;padding:8px 14px}
.sq{font-family:'JetBrains Mono',monospace;font-size:8px;width:46px;padding:4px 2px;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:3px;color:var(--text-muted)}
.sq.on{background:rgba(103,232,249,.05);border-color:rgba(103,232,249,.2);color:var(--cyan)}
.sq.tie{border-color:var(--green)}
.sq-n{font-weight:600}
.table-wrap{overflow:auto;max-height:100%}
table.data{width:100%;border-collapse:collapse;font-size:11px}
table.data th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);color:var(--text-muted);text-align:left;position:sticky;top:0;z-index:10;cursor:pointer;white-space:nowrap;user-select:none}
table.data th:hover{color:var(--text)}
table.data th.sorted{color:var(--text)}
table.data td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10px;white-space:nowrap;color:var(--text-dim)}
table.data tr{transition:background .08s;cursor:pointer}
table.data tr:hover{background:var(--surface-2)}
table.data tr.active{background:var(--accent-dim)}
table.data tr.active td{color:var(--text)}
.td-bar{display:inline-block;height:3px;border-radius:2px;vertical-align:middle;margin-left:4px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-chip{font-family:'JetBrains Mono',monospace;font-size:9px;padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.5px}
.filter-chip:hover{border-color:var(--border-hi);color:var(--text-dim)}
.filter-chip.active{color:var(--text);border-color:var(--text-muted)}
.compare-grid{display:grid;gap:10px}
.compare-col-head{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px 6px 0 0;position:sticky;top:0;z-index:5;letter-spacing:1px}
.compare-section-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:10px 0 4px}
.cmp-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);min-width:120px}
.cmp-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--text-dim)}
.cmp-val.diff{color:var(--orange)}
#fileInput{display:none}
@media(max-width:900px){.sidebar{width:200px}.detail-grid{grid-template-columns:1fr}.credit{display:none}}
</style>
</head>

  <a class="logo" href="https://dreadbox-fx.com/artemis/" target="_blank" rel="noopener" title="Dreadbox Artemis">

<script>
const BANKS={},BANK_SOURCE={};
let activeBank=null,activePresetIdx=0,currentView='detail',compareSelection=[],sortCol=null,sortDir=1,filterMode=null,activeModTab='mod_wheel';
const BANK_LETTERS=['A','B','C','D','E','F','G','H'];
const MODES={Poly:'POLY',Mono:'MONO',Unison:'UNI','_3x2':'TRI','_2x3':'DUO'};
const SECTIONS=[
  {id:'vco',t:'VCO ŌĆö Oscillators',c:'var(--c-vco)',k:['vco_morph','vco_mix','vco_sub_noise','vco_sync','vco_2_tune','vco_detune','vco_glide','vco_pw','vco_fm','vco_fm_eg']},
  {id:'lpf',t:'VCF ŌĆö Low Pass',c:'var(--c-vcf)',k:['lpf_cut','lpf_reson','lpf_poles','lpf_track','lpf_cut_eg_amount','lpf_ffm','lpf_ffm_noise_source']},
  {id:'hpf',t:'VCF ŌĆö High Pass',c:'var(--c-vcf)',k:['hpf_cut','hpf_reson']},
  {id:'vca',t:'Env ŌĆö Amplitude',c:'var(--c-env)',k:['vca_eg_a','vca_eg_d','vca_eg_s','vca_eg_r']},
  {id:'eg',t:'Env ŌĆö Filter/FM',c:'var(--c-env)',k:['eg_a','eg_d','eg_s','eg_r']},
  {id:'lfo1',t:'LFO 1',c:'var(--c-lfo)',k:['lfo_1_rate','lfo_1_fade','lfo_1_wave','lfo_1_vco_target','lfo_1_vco_amount','lfo_1_vcf_amount']},
  {id:'lfo2',t:'LFO 2',c:'var(--c-lfo)',k:['lfo_2_rate','lfo_2_xmod','lfo_2_wave','lfo_2_sync_mode','lfo_2_morph_amount','lfo_2_vco_1_pw_amount']},
  {id:'gl',t:'Global',c:'var(--c-global)',k:['play_mode','legato','glide','drive_mode','spread','level','bpm','instability_depth','amp_velocity']},
];
const FX=[
  {id:'distortions',t:'FX ŌĆö Distortion',c:'var(--c-fx)'},
  {id:'modulations',t:'FX ŌĆö Modulation',c:'var(--c-fx)'},
  {id:'delays',t:'FX ŌĆö Delay',c:'var(--c-fx)'},
  {id:'reverbs',t:'FX ŌĆö Reverb',c:'var(--c-fx)'},

function classifyPreset(p){const b=p.base||{};const a=b.vca_eg_a||0,d=b.vca_eg_d||0,s=b.vca_eg_s||0,r=b.vca_eg_r||0;const cut=b.lpf_cut||0,res=b.lpf_reson||0;const mode=b.play_mode||'Poly';const spread=b.spread||0;const detune=b.vco_detune||0;const sub=b.vco_sub_noise||0;const morph=b.vco_morph||0;const mix=b.vco_mix||0;const sync=b.vco_sync||false;const fm=b.vco_fm||0;const lfo1vco=b.lfo_1_vco_amount||0;const lfo1vcf=b.lfo_1_vcf_amount||0;const lfo2morph=b.lfo_2_morph_amount||0;const seq=b.seq||{};const seqTyp=seq.typ||'';const revMix=(b.reverbs||{}).mix||0;const modMix=(b.modulations||{}).mix||0;const delMix=(b.delays||{}).mix||0;const distMix=(b.distortions||{}).mix||0;const distGain=(b.distortions||{}).gain||0;const isMono=mode==='Mono'||mode==='Unison';const isPoly=mode==='Poly';const hasFX=revMix>0.2||modMix>0.2||delMix>0.2;const hasSeq=seqTyp==='Sequencer'&&seq.sequencer&&seq.sequencer.steps&&seq.sequencer.steps.some(st=>st.notes&&st.notes.length>0);const hasArp=seqTyp==='Arpeggiator';const longEnv=a>0.3&&r>0.3;const shortEnv=a<0.1&&d<0.3&&r<0.25;const pluckEnv=a<0.05&&d>0.15&&d<0.7&&s<0.3;const droneEnv=s>0.8&&r>0.5;const heavyLfo=Math.abs(lfo1vco)>0.1||Math.abs(lfo1vcf)>0.15||Math.abs(lfo2morph)>0.1;if(hasSeq)return'Sequence';if(hasArp)return'Arp';if(isMono&&cut<0.2&&shortEnv&&sub>0.1)return'Sub Bass';if(isMono&&shortEnv&&cut<0.4)return'Bass';if(isMono&&distMix>0.2&&distGain>0.2)return'Aggressive Lead';if(isMono&&(sync||fm>0.1))return'Sync Lead';if(isMono&&cut>0.4)return'Lead';if(isMono)return'Mono';if(isPoly&&droneEnv&&revMix>0.3)return'Drone';if(isPoly&&longEnv&&spread>0.3&&(revMix>0.2||modMix>0.2))return'Ambient Pad';if(isPoly&&longEnv&&heavyLfo)return'Evolving Pad';if(isPoly&&longEnv)return'Pad';if(isPoly&&pluckEnv&&!hasFX)return'Pluck';if(isPoly&&pluckEnv)return'Keys';if(isPoly&&shortEnv&&cut>0.5)return'Stab';if(isPoly&&shortEnv)return'Keys';if(isPoly&&heavyLfo)return'Motion';return isPoly?'Poly':'Synth'}

function toggleMidiPanel(){document.getElementById('midiPanel').classList.toggle('open');if(!midiAccess)initMidi()}

function closeMidiPanel(){document.getElementById('midiPanel').classList.remove('open')}

async function initMidi(){if(!navigator.requestMIDIAccess){setMidiStatus('Web MIDI not supported in this browser. Use Chrome or Edge.');return}try{midiAccess=await navigator.requestMIDIAccess({sysex:true});populateMidiPorts();midiAccess.onstatechange=()=>populateMidiPorts()}catch(e){setMidiStatus('MIDI access denied. Please allow SysEx access when prompted.')}}

function populateMidiPorts(){const sel=document.getElementById('midiPortSelect');const prev=sel.value;sel.innerHTML='<option value="">ŌĆö Select MIDI Input ŌĆö</option>';for(const[id,port]of midiAccess.inputs){const opt=document.createElement('option');opt.value=id;opt.textContent=port.name+(port.manufacturer?' ('+port.manufacturer+')':'');sel.appendChild(opt)}if(prev&&sel.querySelector(`option[value="${prev}"]`))sel.value=prev;setMidiStatus(midiAccess.inputs.size===0?'No MIDI devices found. Connect your Artemis via USB and refresh.':'Select your Artemis MIDI input port above.')}

function toggleListen(){if(midiListening){stopListening()}else{startListening()}}

function startListening(){const sel=document.getElementById('midiPortSelect');if(!sel.value){setMidiStatus('Please select a MIDI input port first.');return}if(midiInput)midiInput.onmidimessage=null;midiInput=midiAccess.inputs.get(sel.value);if(!midiInput){setMidiStatus('Port not found. Try refreshing.');return}midiBuffer=[];midiInput.onmidimessage=handleMidiMessage;midiListening=true;document.getElementById('listenBtn').textContent='Stop Listening';document.getElementById('listenBtn').classList.add('active');document.getElementById('midiBtn').classList.add('listening');const slotName=activeBank?activeBank+String((activePresetIdx||0)+1).padStart(2,'0'):'?';setMidiStatus('Listening on '+midiInput.name+'...<br>Trigger a preset or bank export from your Artemis now.<br>Single presets will load into <span class="count">'+slotName+'</span>.')}

function stopListening(){if(midiInput)midiInput.onmidimessage=null;midiListening=false;document.getElementById('listenBtn').textContent='Start Listening';document.getElementById('listenBtn').classList.remove('active');document.getElementById('midiBtn').classList.remove('listening');setMidiStatus('Stopped listening. '+midiBuffer.length+' SysEx message(s) in buffer.')}

function handleMidiMessage(e){const d=e.data;if(d[0]!==0xF0)return;midiBuffer.push(new Uint8Array(d));const count=midiBuffer.length;setMidiStatus('Receiving... <span class="count">'+count+'</span> SysEx message(s)<br>'+(count===1?'Got header ŌĆö waiting for preset data...':(count<=65?'Receiving presets... '+(count-1)+'/64':'Received '+count+' messages')));if(midiTimeout)clearTimeout(midiTimeout);midiTimeout=setTimeout(()=>processMidiBuffer(),1500)}

function processMidiBuffer(){if(midiBuffer.length===0)return;console.log('MIDI buffer: '+midiBuffer.length+' messages');for(let i=0;i<Math.min(3,midiBuffer.length);i++){const payload=midiBuffer[i].slice(6,midiBuffer[i].length-1);const txt=new TextDecoder().decode(payload);console.log('Message '+i+' payload: '+txt)}let bankLetter=null;let presetMessages=midiBuffer;if(midiBuffer.length>=2){const firstPayload=midiBuffer[0].slice(6,midiBuffer[0].length-1);const firstTxt=new TextDecoder().decode(firstPayload);try{const hdr=JSON.parse(firstTxt);if(hdr.BankBackup!==undefined){const bankNum=parseInt(hdr.BankBackup);if(bankNum>=0&&bankNum<8)bankLetter=BANK_LETTERS[bankNum];presetMessages=midiBuffer.slice(1);console.log('Bank header found: BankBackup='+bankNum+' ŌåÆ Bank '+bankLetter)}else if(typeof hdr==='string'&&hdr==='PresetBackup'){presetMessages=midiBuffer.slice(1);console.log('Single preset header found')}}catch(e){}}const totalLen=presetMessages.reduce((s,m)=>s+m.length,0);const combined=new Uint8Array(totalLen);let off=0;for(const m of presetMessages){combined.set(m,off);off+=m.length}const presets=parseSyx(combined.buffer);if(!presets.length){setMidiStatus('Received '+midiBuffer.length+' SysEx messages but could not parse any presets.');return}if(bankLetter&&presets.length>=64){BANKS[bankLetter]=presets.slice(0,64);BANK_SOURCE[bankLetter]='user';renderBankTabs();switchBank(bankLetter);setMidiStatus('Bank '+bankLetter+' loaded! <span class="count">'+presets.length+'</span> presets received via MIDI.')}else if(presets.length>=64&&!bankLetter){for(const l of BANK_LETTERS)if(!BANKS[l]){bankLetter=l;break};if(!bankLetter)bankLetter='A';BANKS[bankLetter]=presets.slice(0,64);BANK_SOURCE[bankLetter]='user';renderBankTabs();switchBank(bankLetter);setMidiStatus('Bank '+bankLetter+' loaded! <span class="count">'+presets.length+'</span> presets received via MIDI.')}else if(presets.length>=1){const p=presets[0];if(!BANKS[activeBank])BANKS[activeBank]=[];const slot=activePresetIdx||0;BANKS[activeBank][slot]=p;BANK_SOURCE[activeBank]=BANK_SOURCE[activeBank]||'user';renderBankTabs();renderSidebar();renderView();const slotName=activeBank+String(slot+1).padStart(2,'0');setMidiStatus('Preset received ŌåÆ <span class="count">'+slotName+'</span>');setTimeout(()=>{const items=document.querySelectorAll('.preset-item');if(items[slot]){items[slot].classList.add('flash');setTimeout(()=>items[slot].classList.remove('flash'),1000)}},50)}midiBuffer=[]}

function clearMidiBuffer(){midiBuffer=[];setMidiStatus(midiListening?'Buffer cleared. Listening on '+midiInput.name+'...':'Buffer cleared.')}

function setMidiStatus(html){document.getElementById('midiStatus').innerHTML=html}

function buildSyx(presets){const header=[0xF0,0x00,0x21,0x35,0x00,0x09];const enc=new TextEncoder();const msgs=[];const hdrPayload=enc.encode('"PresetBackup"');msgs.push(new Uint8Array([...header,...hdrPayload,0xF7]));for(const p of presets){const json=enc.encode(JSON.stringify(p));msgs.push(new Uint8Array([...header,...json,0xF7]))}let total=0;for(const m of msgs)total+=m.length;const out=new Uint8Array(total);let off=0;for(const m of msgs){out.set(m,off);off+=m.length}return out}

async function downloadAll(){const loadedBanks=BANK_LETTERS.filter(l=>BANKS[l]);if(!loadedBanks.length){alert('No banks loaded to download.');return}const zip=new JSZip();for(const l of loadedBanks){const syx=buildSyx(BANKS[l]);zip.file(`artemis-bank-${l.toLowerCase()}.syx`,syx)}try{const htmlResp=await fetch(window.location.href);if(htmlResp.ok){const htmlText=await htmlResp.text();zip.file('artemis-explorer.html',htmlText)}}catch(e){zip.file('artemis-explorer.html','<!-- Could not include HTML - save it manually from your browser -->')}const blob=await zip.generateAsync({type:'blob'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='artemis-presets.zip';a.click();URL.revokeObjectURL(url)}

renderBankTabs();switchBank('A');autoLoadBanks();
</script>
